[build]
  command       = "npm run build"
  publish       = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."enhance"]
  timeout = 26

# SPA fallback – all routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
